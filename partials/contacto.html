<section class="section" id="contacto" style="background: var(--crema);">
    <div class="section-inner">
        <div class="section-header">
            <span class="section-eyebrow">Comunicación</span>
            <h2 class="section-title"><em>Contacto</em></h2>
        </div>
        <div class="contacto-grid">
            <div class="contacto-info">
                <h3>Escríbenos</h3>
                <p>Completa el formulario y te contactaremos por WhatsApp para darte acceso a la plataforma.</p>
                <div class="contact-items">
                    <div class="contact-item">
                        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5.1-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg>
                        <span>Respuesta directa por WhatsApp</span>
                    </div>
                </div>
            </div>
            <div>
                <div class="contacto-form">
                    <div>
                        <label>Nombre completo</label>
                        <input type="text" class="input" id="contacto-nombre" placeholder="Tu nombre">
                    </div>
                    <div>
                        <label>Correo electrónico</label>
                        <input type="email" class="input" id="contacto-correo" placeholder="correo@ejemplo.com">
                    </div>
                    <div>
                        <label>Mensaje</label>
                        <textarea class="input" id="contacto-mensaje" rows="4" placeholder="Cuéntanos brevemente qué necesitas..."></textarea>
                    </div>
                    <button class="btn btn-primary" onclick="enviarContacto()">
                        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:currentColor;vertical-align:middle;margin-right:6px;"><path d="M12 2a10 10 0 0 0-8.6 15.1L2 22l5.1-1.3A10 10 0 1 0 12 2zm0 18.2c-1.6 0-3.1-.4-4.4-1.2l-.3-.2-3 .8.8-2.9-.2-.3A8.2 8.2 0 1 1 12 20.2z"/></svg>
                        Escribir por WhatsApp
                    </button>
                </div>
            </div>
        </div>
    </div>
</section>
